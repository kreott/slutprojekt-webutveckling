<!DOCTYPE html>
<html>
    <head>
        <title>Assembly Playground</title>
        <link rel="icon" type="image/x-icon" href="icon.jpg">
        <link rel="stylesheet" href="css/style.css">
        <script src="js/asm.js" defer></script>
        <script src="js/ui.js" defer></script>

        <!-- import codemirror (easy web ide style textarea) -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
        <script src="js/codemirror/asm-mode.js"></script>
    </head>

    <body>
        <div class="app">
            <div class="editor-panel">
                <h1>ASSEMBLY PLAYGROUND</h1>
                <div class="toolbar">
                    <label>INTERVAL MODE:</label>
                    <span id="speed-display"></span>
                    <input type="range" id="speed-slider" min="0" max="3000" value="0" step="200">
                    <button id="btn-run">RUN</button>
                    <button id="btn-step">STEP</button>
                    <button id="btn-reset">STOP</button>
                </div>
                <textarea id="code-input"></textarea>
            </div>
            <div class="state-panel">
                <div class="registers-panel">
                    <h2>REGISTERS</h2>
                    <div class="registers-grid">
                        <div class="register" id="reg-EAX">EAX: <span class="reg-value">0</span></div>
                        <div class="register" id="reg-AX">AX: <span class="reg-value">0</span></div>
                        <div class="register" id="reg-EBX">EBX: <span class="reg-value">0</span></div>
                        <div class="register" id="reg-BX">BX: <span class="reg-value">0</span></div>
                        <div class="register" id="reg-ECX">ECX: <span class="reg-value">0</span></div>
                        <div class="register" id="reg-CX">CX: <span class="reg-value">0</span></div>
                        <div class="register" id="reg-EDX">EDX: <span class="reg-value">0</span></div>
                        <div class="register" id="reg-DX">DX: <span class="reg-value">0</span></div>
                    </div>
                    <h2>FLAGS</h2>
                    <div class="flag" id="flag-zero">ZERO: <span class="flag-value">false</span></div>
                    <div class="flag" id="flag-carry">CARRY: <span class="flag-value">false</span></div>
                    <h2>PROGRAM COUNTER</h2>
                    <div class="pc" id="pc-display">PC: <span class="pc-value">0</span></div>
                </div>
                <div class="log-panel">
                    <h2>OUTPUT</h2>
                    <div id="log-output"></div>
                </div>
            </div>
        </div>
    </body>
</html>
